<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <section class="gg">
        <form action="register.php" method="post">
            
            <label for="fullname">Fullname</label>
            <input type="text" name="fullname" id="fullname" required><br><br>

            <label for="student_id">StudentID</label>
            <input type="text" name="student_id" id="student_id" required><br><br>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" required><br><br>

            <label for="phone">Phone</label>
            <input type="tel" name="phone" id="phone"><br><br>

            <label for="dob">Date of birth</label>
            <input type="date" name="dob" id="dob"><br><br>

            <label>Gender</label><br><br>

            <input type="radio" name="gender" id="gender_f" value="Female" required> <label for="gender_f">Female</label><br>
            <input type="radio" name="gender" id="gender_m" value="Male" required> <label for="gender_m">Male</label><br><br>

            <label for="department">Department</label>
            <select name="department" id="department">
                <option value="A1">A1</option>
                <option value="A2">A2</option>
            </select><br><br>

            <label for="semester">Semester</label>
            <select name="semester" id="semester">
                <option value="first">first</option>
                <option value="second">second</option>
            </select><br><br>

            <label for="address">Address:</label><br>
            <textarea name="address" id="address"></textarea><br><br>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required><br><br>

            <label for="confirm_password">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required><br><br>

            <button type="submit" name="submit">Zarejestruj</button>
        </form>
    </section>

</body>
</html>
